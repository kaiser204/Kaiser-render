<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>

<body style="font-family:Arial;background:#0f172a;color:white;padding:20px;">

<h1>📊 Dashboard Empresa</h1>

<h3>Adicionar Produto</h3>

<input id="name" placeholder="nome"><br><br>
<input id="price" placeholder="preço"><br><br>

<button onclick="add()">Adicionar</button>

<hr>

<h3>📦 Produtos</h3>
<div id="list"></div>

<hr>

<h3>💰 Pagamentos</h3>
<p>M-Pesa: 858417039</p>
<p>e-Mola: 867351644</p>

<hr>

<a href="https://wa.me/258858417039" style="color:#25D366;">
📞 WhatsApp
</a>

<script>

function load(){
  fetch("/products")
  .then(r=>r.json())
  .then(data=>{
    list.innerHTML = data.map(p =>
      `<p>${p.name} - ${p.price} MT</p>`
    ).join("");
  });
}

function add(){
  fetch("/products",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:name.value,
      price:price.value
    })
  }).then(()=>load());
}

load();

</script>

</body>
</html>
